<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Phillips Family Stack Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#161b24;--surface2:#1e2535;--border:#242d3d;--green:#00e87a;--red:#ff4466;--amber:#ffb340;--blue:#3d9eff;--purple:#a78bfa;--dim:#3d4f6b;--text:#8ba3c0;--bright:#e2eaf5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important;}
.green{color:var(--green);} .red{color:var(--red);} .amber{color:var(--amber);}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s;}
#loader.fade{opacity:0;pointer-events:none;}
.ld-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--blue);letter-spacing:3px;margin-bottom:4px;}
.ld-sub{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:20px;}
.ld-bar{width:160px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.ld-fill{height:100%;background:var(--blue);border-radius:1px;box-shadow:0 0 8px var(--blue);transition:width .4s;}

/* PROFILE SCREEN */
#screen-profile{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
.ps-logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--blue);letter-spacing:2px;margin-bottom:4px;}
.ps-logo span{color:var(--green);}
.ps-tagline{font-size:12px;color:var(--dim);letter-spacing:1px;margin-bottom:40px;}
.ps-heading{font-size:22px;font-weight:900;color:var(--bright);margin-bottom:6px;}
.ps-sub{font-size:13px;color:var(--text);margin-bottom:28px;}
.ps-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;}
.ps-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:18px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:16px;text-align:left;}
.ps-card:active{transform:scale(.97);border-color:var(--blue);}
.ps-emoji{font-size:32px;width:44px;text-align:center;flex-shrink:0;}
.ps-name{font-size:17px;font-weight:800;color:var(--bright);}
.ps-desc{font-size:11px;color:var(--text);margin-top:2px;}
.ps-bal{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--green);margin-top:3px;}

/* APP SHELL */
#screen-app{display:flex;flex-direction:column;min-height:100vh;}
.app-header{padding:10px 14px 8px;border-bottom:1px solid var(--border);background:rgba(13,15,20,.96);backdrop-filter:blur(8px);position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;}
.ah-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--blue);letter-spacing:2px;}
.ah-profile{font-size:11px;color:var(--green);letter-spacing:1px;margin-top:1px;}
.ah-right{display:flex;align-items:center;gap:6px;}
.hdr-btn{font-size:9px;letter-spacing:1px;padding:6px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text);background:transparent;cursor:pointer;font-family:'Share Tech Mono',monospace;-webkit-appearance:none;white-space:nowrap;}
.hdr-btn.deep{border-color:var(--purple);color:var(--purple);}
.app-content{flex:1;overflow-y:auto;padding-bottom:68px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(13,15,20,.97);border-top:1px solid var(--border);display:flex;z-index:40;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--dim);font-size:8px;letter-spacing:.5px;font-family:'Share Tech Mono',monospace;transition:color .2s;-webkit-appearance:none;touch-action:manipulation;padding:0 2px;}
.nav-btn.active{color:var(--blue);}
.nav-icon{font-size:17px;line-height:1;}

/* SEARCH BAR */
.search-wrap{padding:10px 12px 4px;position:relative;}
.search-inp{width:100%;padding:10px 14px 10px 38px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--bright);font-size:14px;font-family:'Nunito',sans-serif;-webkit-appearance:none;}
.search-inp:focus{outline:none;border-color:var(--blue);}
.search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;margin-top:2px;}
.search-results{margin:0 12px 8px;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.sr-item{padding:12px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid var(--border);}
.sr-item:last-child{border-bottom:none;}
.sr-item:active{background:var(--surface2);}
.sr-emoji{font-size:22px;width:32px;text-align:center;}
.sr-ticker{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--bright);}
.sr-name{font-size:11px;color:var(--text);}
.sr-tag{font-size:9px;padding:2px 6px;border-radius:6px;background:rgba(61,158,255,.15);color:var(--blue);margin-left:auto;flex-shrink:0;}

/* STOCK CARDS */
.view-header{padding:14px 16px 4px;}
.view-title{font-size:20px;font-weight:900;color:var(--bright);}
.view-sub{font-size:12px;color:var(--text);margin-top:2px;}
.cat-label{font-size:9px;letter-spacing:3px;color:var(--blue);font-family:'Share Tech Mono',monospace;padding:12px 16px 5px;}
.stock-card{margin:0 12px 8px;background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;cursor:pointer;transition:all .15s;}
.stock-card:active{transform:scale(.98);background:var(--surface2);}
.sc-emoji{font-size:24px;width:36px;text-align:center;flex-shrink:0;}
.sc-mid{flex:1;min-width:0;margin:0 10px;}
.sc-ticker{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--bright);}
.sc-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.sc-right{text-align:right;flex-shrink:0;}
.sc-price{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--bright);}
.sc-chg{font-size:11px;margin-top:1px;}
.sc-sig{font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:8px;font-family:'Share Tech Mono',monospace;margin-top:4px;display:inline-block;}
.sc-sig.BUY{background:rgba(0,232,122,.15);color:var(--green);border:1px solid rgba(0,232,122,.3);}
.sc-sig.SELL{background:rgba(255,68,102,.15);color:var(--red);border:1px solid rgba(255,68,102,.3);}
.sc-sig.WAIT{background:rgba(255,179,64,.15);color:var(--amber);border:1px solid rgba(255,179,64,.3);}
.sc-sig.LOAD{background:rgba(61,78,107,.2);color:var(--dim);border:1px solid var(--border);animation:blink .9s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* DETAIL */
.detail-back{padding:11px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;font-weight:700;}
.detail-back:active{background:var(--surface);}
.detail-hero{padding:20px 16px;text-align:center;border-bottom:1px solid var(--border);}
.dh-emoji{font-size:42px;margin-bottom:8px;}
.dh-ticker{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--bright);}
.dh-name{font-size:13px;color:var(--text);margin-top:2px;margin-bottom:12px;}
.dh-price{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:700;color:var(--bright);}
.dh-chg{font-size:13px;margin-top:4px;margin-bottom:16px;}
.dh-signal{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;letter-spacing:3px;transition:all .3s;margin-bottom:5px;}
.dh-signal.BUY{color:var(--green);text-shadow:0 0 30px rgba(0,232,122,.4);}
.dh-signal.SELL{color:var(--red);text-shadow:0 0 30px rgba(255,68,102,.4);}
.dh-signal.WAIT{color:var(--amber);text-shadow:0 0 20px rgba(255,179,64,.4);}
.conf-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px;}
.conf-dot{width:10px;height:10px;border-radius:50%;}
.conf-dot.g{background:var(--green);} .conf-dot.r{background:var(--red);} .conf-dot.a{background:var(--amber);} .conf-dot.o{background:var(--border);}
.dh-summary{font-size:14px;color:var(--text);line-height:1.6;max-width:300px;margin:0 auto 18px;background:var(--surface);border-radius:12px;padding:12px 14px;text-align:left;}
.move-btn{width:calc(100%-32px);margin:0 16px;padding:15px;border-radius:12px;background:var(--blue);color:#fff;font-size:15px;font-weight:800;letter-spacing:1px;border:none;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;display:block;width:calc(100% - 32px);}
.move-btn:active{opacity:.85;transform:scale(.98);}
.alert-row-btn{width:calc(100% - 32px);margin:8px 16px 0;padding:11px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.alert-row-btn:active{background:var(--surface2);}

/* WHY SECTION */
.section-card{margin:10px 12px 0;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.sec-toggle{padding:13px 15px;font-size:13px;font-weight:700;color:var(--bright);cursor:pointer;display:flex;align-items:center;gap:8px;}
.sec-toggle:active{background:var(--surface2);}
.why-item{padding:12px 14px;border-top:1px solid var(--border);border-left:3px solid var(--border);}
.why-item.bull{border-left-color:var(--green);}
.why-item.bear{border-left-color:var(--red);}
.why-item.neutral{border-left-color:var(--amber);}
.wi-head{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.wi-icon{font-size:13px;}
.wi-lbl{font-size:10px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;color:var(--text);}
.wi-plain{font-size:13px;color:var(--bright);font-weight:700;}
.wi-trans{font-size:12px;color:var(--text);margin-top:3px;line-height:1.5;}

/* INDICATORS (DEEP) */
.ind-card{margin:0 12px 8px;background:var(--surface);border-radius:12px;padding:13px 14px;border:1px solid var(--border);cursor:pointer;}
.ind-card:active{background:var(--surface2);}
.ind-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.ind-name{font-size:10px;font-family:'Share Tech Mono',monospace;letter-spacing:2px;color:var(--blue);}
.ind-badge{font-size:9px;padding:3px 8px;border-radius:8px;letter-spacing:1px;}
.ind-badge.bull{background:rgba(0,232,122,.15);color:var(--green);}
.ind-badge.bear{background:rgba(255,68,102,.15);color:var(--red);}
.ind-badge.neutral{background:rgba(255,179,64,.15);color:var(--amber);}
.ind-val{font-family:'Orbitron',sans-serif;font-size:19px;font-weight:700;color:var(--bright);margin-bottom:3px;}
.ind-plain{font-size:12px;color:var(--text);line-height:1.5;}
.ind-tap{font-size:10px;color:var(--dim);margin-top:4px;}
.chart-wrap{margin:0 12px 12px;}
.chart-lbl{font-size:9px;letter-spacing:3px;color:var(--blue);font-family:'Share Tech Mono',monospace;margin-bottom:6px;}
canvas{width:100%;display:block;border-radius:8px;background:var(--surface);}

/* HOLDING BANNER */
.hold-banner{margin:10px 12px 0;background:var(--surface2);border-radius:10px;padding:11px 13px;border:1px solid var(--border);font-size:12px;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:80;display:flex;align-items:flex-end;backdrop-filter:blur(4px);opacity:0;transition:opacity .25s;pointer-events:none;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s ease;max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:800;color:var(--bright);margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--text);margin-bottom:18px;line-height:1.6;}

/* TRADE */
.amt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.amt-btn{padding:11px 4px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;text-align:center;-webkit-appearance:none;transition:all .15s;font-family:'Nunito',sans-serif;}
.amt-btn.sel{border-color:var(--blue);color:var(--blue);background:rgba(61,158,255,.1);}
.amt-btn:active{transform:scale(.94);}
.custom-inp{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--bright);font-size:15px;font-family:'Share Tech Mono',monospace;margin-bottom:14px;-webkit-appearance:none;}
.custom-inp:focus{outline:none;border-color:var(--blue);}
.trade-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.trd-btn{padding:15px 4px;border-radius:12px;border:2px solid var(--border);background:transparent;font-size:13px;font-weight:800;letter-spacing:1px;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;transition:all .15s;font-family:'Nunito',sans-serif;}
.trd-btn:active{transform:scale(.95);}
.trd-btn.buy{border-color:var(--green);color:var(--green);}
.trd-btn.sell{border-color:var(--red);color:var(--red);}
.trd-btn.skip{border-color:var(--dim);color:var(--dim);}
.trd-btn:disabled{opacity:.35;}
.trade-cash{font-size:11px;color:var(--dim);text-align:center;font-family:'Share Tech Mono',monospace;}

/* ALERT MODAL */
.alert-type-row{display:flex;gap:8px;margin-bottom:14px;}
.alert-type-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;text-align:center;transition:all .15s;}
.alert-type-btn.sel{border-color:var(--blue);color:var(--blue);background:rgba(61,158,255,.1);}
.alert-inp{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--bright);font-size:16px;font-family:'Share Tech Mono',monospace;margin-bottom:14px;-webkit-appearance:none;}
.alert-inp:focus{outline:none;border-color:var(--blue);}
.alert-set-btn{width:100%;padding:14px;border-radius:12px;background:var(--blue);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;-webkit-appearance:none;}
.alert-set-btn:active{opacity:.85;}
.active-alert{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;}
.aa-text{font-size:13px;color:var(--bright);}
.aa-sub{font-size:11px;color:var(--text);margin-top:2px;}
.aa-del{font-size:18px;cursor:pointer;color:var(--dim);padding:4px;}

/* LEARN MODAL */
.learn-sec{margin-bottom:14px;}
.learn-lbl{font-size:10px;letter-spacing:2px;color:var(--blue);font-family:'Share Tech Mono',monospace;margin-bottom:4px;}
.learn-txt{font-size:14px;color:var(--bright);line-height:1.6;}
.learn-mark-btn{width:100%;padding:14px;border-radius:10px;border:1px solid var(--green);background:rgba(0,232,122,.1);color:var(--green);font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;margin-top:8px;}
.learn-mark-btn.done{border-color:var(--dim);color:var(--dim);background:transparent;}

/* PORTFOLIO */
.port-hero{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.port-lbl{font-size:10px;letter-spacing:2px;color:var(--text);font-family:'Share Tech Mono',monospace;}
.port-total{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:700;color:var(--bright);margin:4px 0;}
.port-pnl{font-size:14px;font-weight:700;}
.port-rows{padding:10px 16px;border-bottom:1px solid var(--border);}
.port-row{display:flex;justify-content:space-between;padding:3px 0;}
.pr-lbl{font-size:12px;color:var(--text);}
.pr-val{font-size:12px;font-family:'Share Tech Mono',monospace;color:var(--bright);}
.sec-hdr{font-size:9px;letter-spacing:3px;color:var(--blue);font-family:'Share Tech Mono',monospace;padding:13px 16px 5px;text-transform:uppercase;}
.hold-card{margin:0 12px 8px;background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);cursor:pointer;}
.hold-card:active{background:var(--surface2);}
.hold-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hold-ticker{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--bright);}
.hold-shares{font-size:11px;color:var(--text);margin-top:2px;}
.hold-val{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--bright);text-align:right;}
.hold-pnl{font-size:11px;margin-top:2px;text-align:right;}
.trade-row{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.tr-action{font-size:10px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.tr-action.buy{color:var(--green);} .tr-action.sell{color:var(--red);} .tr-action.skip{color:var(--dim);}
.tr-ticker{font-size:14px;font-weight:700;color:var(--bright);}
.tr-date{font-size:10px;color:var(--dim);}
.tr-amt{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--bright);text-align:right;}
.tr-shares{font-size:11px;color:var(--text);text-align:right;}

/* ALERTS IN PORTFOLIO */
.alert-card{margin:0 12px 8px;background:var(--surface);border-radius:12px;padding:13px 15px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ac-left{}
.ac-ticker{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--bright);}
.ac-cond{font-size:12px;color:var(--text);margin-top:2px;}
.ac-status{font-size:10px;padding:3px 8px;border-radius:8px;margin-top:4px;display:inline-block;font-family:'Share Tech Mono',monospace;}
.ac-status.active{background:rgba(61,158,255,.15);color:var(--blue);}
.ac-status.triggered{background:rgba(0,232,122,.15);color:var(--green);}
.ac-del{font-size:20px;cursor:pointer;color:var(--dim);padding:4px 0 4px 12px;}

/* STATS */
.stats-card{margin:14px 12px;background:linear-gradient(135deg,#0d1a2e,#131f35);border:1px solid var(--border);border-radius:20px;padding:22px;position:relative;overflow:hidden;}
.stats-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green));}
.sc-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.sc-emoji{font-size:30px;}
.sc-pname{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--bright);}
.sc-psub{font-size:11px;color:var(--text);margin-top:2px;}
.sc-total{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;color:var(--bright);margin-bottom:3px;}
.sc-ret{font-size:14px;font-weight:700;margin-bottom:16px;}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sc-item{background:rgba(255,255,255,.04);border-radius:10px;padding:11px;}
.sc-item-lbl{font-size:10px;color:var(--text);letter-spacing:1px;margin-bottom:4px;}
.sc-item-val{font-size:15px;font-weight:800;color:var(--bright);}
.sc-item-sub{font-size:10px;color:var(--text);margin-top:2px;}
.share-card-btn{width:100%;margin-top:12px;padding:12px;border-radius:12px;background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.3);color:var(--green);font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.share-card-btn:active{background:rgba(0,232,122,.2);}
.compare-box{margin:0 12px 8px;background:var(--surface);border-radius:12px;padding:13px 15px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.cb-left{}
.cb-name{font-size:14px;font-weight:800;color:var(--bright);}
.cb-role{font-size:11px;color:var(--text);margin-top:1px;}
.cb-right{text-align:right;}
.cb-val{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--bright);}
.cb-ret{font-size:12px;margin-top:2px;}

/* ACCURACY LOG */

async function fetchWithProxy(url,ms=10000){
  const proxies=[u=>u, u=>`https://corsproxy.io/?${encodeURIComponent(u)}`, u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`];
  for(const proxy of proxies){
    const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),ms);
    try{
      const r=await fetch(proxy(url),{signal:ctrl.signal}); clearTimeout(t);
      if(!r.ok) throw new Error('HTTP '+r.status);
      let d=await r.json();
      if(d&&d.contents) d=JSON.parse(d.contents);
      return d;
    }catch(e){clearTimeout(t);console.warn(e.message);}
  }
  throw new Error('All proxies failed');
}

async function fetchStock(ticker){
  if(stockCache[ticker]) return stockCache[ticker];
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=3mo`;
  const d=await fetchWithProxy(url);
  const r=d.chart.result[0], q=r.indicators.quote[0];
  const candles=[];
  for(let i=0;i<r.timestamp.length;i++){
    if(q.close[i]==null) continue;
    candles.push({t:r.timestamp[i]*1000,o:q.open[i]||q.close[i],h:q.high[i]||q.close[i],l:q.low[i]||q.close[i],c:q.close[i],v:q.volume[i]||0});
  }
  const result={price:r.meta.regularMarketPrice,prevClose:r.meta.chartPreviousClose,candles};
  stockCache[ticker]=result;
  return result;
}

// Search Yahoo Finance for unknown tickers
async function searchTicker(query){
  const url=`https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&lang=en-US&region=US&quotesCount=6&newsCount=0`;
  const d=await fetchWithProxy(url);
  return (d.quotes||[]).filter(q=>q.quoteType==='EQUITY'||q.quoteType==='ETF').slice(0,6);
}

// ─────────────────────────────────────────────────────────────────────────────
function ema(d,p){const k=2/(p+1);let a=[],prev=d.slice(0,p).reduce((x,y)=>x+y,0)/p;a.push(prev);for(let i=p;i<d.length;i++){prev=d[i]*k+prev*(1-k);a.push(prev);}return a;}
function calcRSI(c,p=14){if(c.length<p+2)return 50;let g=0,l=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?g+=d:l-=d;}let ag=g/p,al=l/p;for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;}return 100-(100/(1+(ag/(al||1e-9))));}
function calcMACD(c){if(c.length<27)return{macd:0,signal:0,hist:0};const e12=ema(c,12),e26=ema(c,26),off=e12.length-e26.length,ml=e26.map((v,i)=>e12[i+off]-v),sl=ema(ml,9);return{macd:ml[ml.length-1],signal:sl[sl.length-1],hist:ml[ml.length-1]-sl[sl.length-1]};}
function sma(a,n){const s=a.slice(-n);return s.reduce((x,y)=>x+y,0)/s.length;}

function computeSignal(ticker, data){
  if(signalCache[ticker]) return signalCache[ticker];
  const {price,candles}=data;
  const cl=candles.map(c=>c.c), vl=candles.map(c=>c.v);
  const rsi=calcRSI(cl), macd=calcMACD(cl);
  const ma20=sma(cl,Math.min(20,cl.length)), ma50=sma(cl,Math.min(50,cl.length));
  const avgVol=sma(vl,Math.min(20,vl.length)), curVol=vl[vl.length-1], volRatio=curVol/(avgVol||1);
  const priceUp=cl[cl.length-1]>=cl[cl.length-2];
  const mom30=cl.length>=30?((price-cl[cl.length-30])/cl[cl.length-30])*100:0;

  let bulls=0,bears=0;const votes=[];

  // RSI
  let rd,rp,rt;
  if(rsi<35){rd='bull';rp='Stock looks oversold';rt='A lot of people have been selling — it often bounces back from here';}
  else if(rsi<45){rd='bull';rp='Selling pressure is easing';rt='More sellers than buyers, but it\'s slowing down — could be finding a floor';}
  else if(rsi<55){rd='neutral';rp='Balanced buying and selling';rt='No strong signal — the market is undecided on this one';}
  else if(rsi<65){rd='neutral';rp='Slight buying advantage';rt='Buyers are in control but it\'s not extreme yet';}
  else{rd='bear';rp='Stock looks overbought';rt='A lot of people have been buying — might be due for a breather';}
  if(rd==='bull')bulls++;else if(rd==='bear')bears++;
  votes.push({name:'RSI',val:`${rsi.toFixed(1)}`,dir:rd,plain:rp,trans:rt,learnId:'rsi'});

  // MACD
  let md,mp,mt;
  if(macd.macd>macd.signal){md='bull';mp='Buying momentum is building';mt='More people are getting in — the trend is accelerating upward';}
  else{md='bear';mp='Buying momentum is fading';mt='Sellers are starting to take over — the upward energy is running out';}
  if(md==='bull')bulls++;else bears++;
  votes.push({name:'MACD',val:`${macd.hist>=0?'+':''}${macd.hist.toFixed(2)}`,dir:md,plain:mp,trans:mt,learnId:'macd'});

  // MA Cross
  let xd,xp,xt;
  if(price>ma20&&ma20>ma50){xd='bull';xp='Golden Cross — uptrend confirmed';xt='Short-term average crossed above long-term — historically a very bullish sign';}
  else if(price<ma20&&ma20<ma50){xd='bear';xp='Death Cross — downtrend warning';xt='Short-term average crossed below long-term — historically a warning sign';}
  else if(price>ma50){xd='bull';xp='Price is above long-term average';xt='The overall trend is still pointing upward from a bigger picture view';}
  else{xd='bear';xp='Price is below long-term average';xt='The bigger picture trend is still pointing down';}
  if(xd==='bull')bulls++;else bears++;
  votes.push({name:'MA CROSS',val:`MA20:$${Math.round(ma20)}`,dir:xd,plain:xp,trans:xt,learnId:'ma'});

  // Volume
  let vd,vp,vt;
  if(volRatio>1.3&&priceUp){vd='bull';vp='High volume on an up day';vt='Lots of people are buying — this move has real conviction behind it';}
  else if(volRatio>1.3&&!priceUp){vd='bear';vp='High volume on a down day';vt='Lots of people are selling — this drop has real weight behind it';}
  else if(volRatio<0.7){vd='neutral';vp='Quiet trading day';vt='Not many people are trading — wait for a clearer signal before acting';}
  else{vd='neutral';vp='Normal trading volume';vt='Nothing unusual — average amount of buying and selling today';}
  if(vd==='bull')bulls++;else if(vd==='bear')bears++;
  votes.push({name:'VOLUME',val:`${((volRatio-1)*100).toFixed(0)}% vs avg`,dir:vd,plain:vp,trans:vt,learnId:'volume'});

  // Momentum
  let od,op,ot;
  if(mom30>8){od='bull';op='Strong 30-day performance';ot=`Up ${mom30.toFixed(1)}% in 30 days — this stock has been outperforming the market`;}
  else if(mom30>2){od='bull';op='Positive 30-day trend';ot=`Up ${mom30.toFixed(1)}% in 30 days — slowly trending the right direction`;}
  else if(mom30>-2){od='neutral';op='Flat over the last month';ot='Basically unchanged over 30 days — no strong directional push either way';}
  else if(mom30>-8){od='bear';op='Negative 30-day trend';ot=`Down ${Math.abs(mom30).toFixed(1)}% in 30 days — slowly trending downward`;}
  else{od='bear';op='Weak 30-day performance';ot=`Down ${Math.abs(mom30).toFixed(1)}% in 30 days — underperforming the market`;}
  if(od==='bull')bulls++;else if(od==='bear')bears++;
  votes.push({name:'MOMENTUM',val:`${mom30>=0?'+':''}${mom30.toFixed(1)}%`,dir:od,plain:op,trans:ot,learnId:'momentum'});

  let signal,confidence,summaryPlain;
  if(bulls>=4){signal='BUY';confidence=bulls;summaryPlain=`${bulls} out of 5 indicators are bullish. The numbers are lining up — this looks like a reasonable time to buy.`;}
  else if(bulls===3){signal='BUY';confidence=3;summaryPlain=`More indicators point up than down right now. A cautious buy could make sense — just don't put everything in.`;}
  else if(bears>=4){signal='SELL';confidence=bears;summaryPlain=`${bears} out of 5 indicators are bearish. The numbers say it might be time to sell or wait on the sidelines.`;}
  else if(bears===3){signal='SELL';confidence=3;summaryPlain=`More indicators point down than up. Consider selling or at least waiting for a clearer signal before buying.`;}
  else{signal='WAIT';confidence=2;summaryPlain=`Signals are mixed — ${bulls} bullish and ${bears} bearish. The smart move right now is to wait and watch.`;}

  const result={signal,confidence,bulls,bears,votes,rsiVal:rsi,macdVal:macd.hist,summaryPlain,ma20,ma50,mom30};
  signalCache[ticker]=result;
  return result;
}

let searchTimeout=null;
async function handleSearch(q){
  clearTimeout(searchTimeout);
  const res=document.getElementById('searchResults');
  if(!q.trim()){res.classList.add('hidden');return;}
  
  // First: filter local list
  const localMatches=Object.entries(STOCKS).filter(([t,s])=>
    t.toLowerCase().includes(q.toLowerCase())||s.name.toLowerCase().includes(q.toLowerCase())
  );

  let html='<div class="search-results">';
  localMatches.forEach(([t,s])=>{
    html+=`<div class="sr-item" onclick="showView('detail','${t}');document.getElementById('searchResults').classList.add('hidden');document.getElementById('searchInp').value='';">
      <span class="sr-emoji">${s.emoji}</span>
      <div><div class="sr-ticker">${t}</div><div class="sr-name">${s.name}</div></div>
      <span class="sr-tag">IN LIST</span>
    </div>`;
  });

  // Then search Yahoo for anything not in list
  searchTimeout=setTimeout(async()=>{
    try{
      const results=await searchTicker(q);
      const newResults=results.filter(r=>!STOCKS[r.symbol]);
      if(newResults.length){
        newResults.forEach(r=>{
          html+=`<div class="sr-item" onclick="showView('detail','${r.symbol}');document.getElementById('searchResults').classList.add('hidden');document.getElementById('searchInp').value='';">
            <span class="sr-emoji">📈</span>
            <div><div class="sr-ticker">${r.symbol}</div><div class="sr-name">${r.shortname||r.longname||r.symbol}</div></div>
            <span class="sr-tag">SEARCH</span>
          </div>`;
        });
      }
      if(!localMatches.length&&!newResults.length){
        html+=`<div class="sr-item"><span class="sr-emoji">🤷</span><div><div class="sr-ticker">No results</div><div class="sr-name">Try a different search</div></div></div>`;
      }
      html+='</div>';
      res.innerHTML=html; res.classList.remove('hidden');
    }catch(e){
      if(localMatches.length){html+='</div>';res.innerHTML=html;res.classList.remove('hidden');}
    }
  },500);

  if(localMatches.length){
    html+='</div>'; res.innerHTML=html; res.classList.remove('hidden');
  }
}

async function loadAllBg(){
  if(loadingBg) return; loadingBg=true;
  const tickers=Object.keys(STOCKS).filter(t=>!stockCache[t]);

      const data=await fetchStock(t);
      computeSignal(t,data);
      if(state.view==='markets'){
        document.querySelectorAll('.stock-card').forEach(card=>{
          if(card.getAttribute('onclick')?.includes(`'${t}'`)){
            const chgV=(data.price-data.prevClose)/data.prevClose*100;
            card.querySelector('.sc-price').textContent='$'+fmt(data.price);
            card.querySelector('.sc-chg').innerHTML=`<span class="${cc(chgV)}">${pct(chgV)}</span>`;
            const se=card.querySelector('.sc-sig');
            if(se){const sg=signalCache[t];se.textContent=sg.signal;se.className=`sc-sig ${sg.signal}`;}
          }
        });
        // Check alerts while we have fresh data
        checkAlerts(t, data.price);
      }
    }catch(e){console.warn('Failed:',t,e.message);}
    await new Promise(r=>setTimeout(r,300));
  }
  loadingBg=false;
  // Update signal accuracy log outcomes
  updateSignalOutcomes();
}

function drawChart(candles,canvasId){
  const canvas=document.getElementById(canvasId); if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth, H=140;
  canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const hi=candles.map(c=>c.h), lo=candles.map(c=>c.l);
  const mn=Math.min(...lo), mx=Math.max(...hi), rng=mx-mn||1, pad=6;
  const toY=v=>H-pad-((v-mn)/rng)*(H-pad*2);
  const bw=(W/candles.length)*.65;
  candles.forEach((c,i)=>{
    const x=(i/candles.length)*W+bw*.5, g=c.c>=c.o;
    ctx.strokeStyle=g?'#00e87a':'#ff4466'; ctx.fillStyle=g?'rgba(0,232,122,.7)':'rgba(255,68,102,.7)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,toY(c.h)); ctx.lineTo(x,toY(c.l)); ctx.stroke();
    const bt=toY(Math.max(c.o,c.c)), bb=toY(Math.min(c.o,c.c));
    ctx.fillRect(x-bw/2,bt,bw,Math.max(bb-bt,1));
  });
}

function executeTrade(action){
  const ticker=state.tradeTicker;
  const data=stockCache[ticker];
  if(!data&&action!=='skip'){toast('⚠️ Load the stock first');closeModal('tradeModal');return;}
  const custom=parseFloat(document.getElementById('customInp').value);
  const amount=state.tradeAmt||custom||100;
  const price=data?.price||0;
  const shares=Math.floor(amount/price);
  const sig=signalCache[ticker];

  if(action==='buy'){
    if(shares<1){toast('⚠️ Not enough to buy 1 share at this price');return;}
    const cost=shares*price;
    if(cost>state.profile.cash){toast(`⚠️ Need $${fmtD(cost)} but only have $${fmtD(state.profile.cash)}`);return;}
    state.profile.cash-=cost;
    if(state.profile.holdings[ticker]){
      const h=state.profile.holdings[ticker];
      const tot=h.shares+shares;
      h.avgPrice=(h.avgPrice*h.shares+cost)/tot; h.shares=tot;
    }else{
      state.profile.holdings[ticker]={shares,avgPrice:price,buyDate:new Date().toISOString()};
    }
    state.profile.tradeHistory.unshift({date:new Date().toISOString(),ticker,action:'buy',shares,price,total:cost});
    toast(`✅ Bought ${shares} shares of ${ticker} for $${fmtD(cost)}`);
  }else if(action==='sell'){
    const h=state.profile.holdings[ticker];
    if(!h){toast('⚠️ You don\'t own any '+ticker);return;}
    const proceeds=h.shares*price, costBasis=h.shares*h.avgPrice, pnlA=proceeds-costBasis;
    state.profile.cash+=proceeds;
    state.profile.tradeHistory.unshift({date:new Date().toISOString(),ticker,action:'sell',shares:h.shares,price,total:proceeds,pnl:pnlA});
    delete state.profile.holdings[ticker];
    toast(`${pnlA>=0?'🎉 Profit!':'📉 Loss'} ${ticker}: ${pnlA>=0?'+':''}$${fmtD(Math.abs(pnlA))}`);
  }else{
    state.profile.tradeHistory.unshift({date:new Date().toISOString(),ticker,action:'skip',shares:0,price,total:0});
    toast(`⏭ Skipped ${ticker} — logged for accuracy`);
  }

  // Log signal accuracy entry
  if(sig){
    state.profile.signalLog.unshift({id:Date.now(),date:new Date().toISOString(),ticker,signal:sig.signal,priceAtSignal:price,userAction:action,outcome7d:null,outcome30d:null});
    if(state.profile.signalLog.length>100) state.profile.signalLog.pop();
  }
  save(); closeModal('tradeModal');
  if(state.view==='detail') renderDetail(ticker);
}

// PRICE ALERTS

function openAlertModal(ticker){
  state.alertTicker=ticker; state.alertType='above';
  const data=stockCache[ticker];
  const s=STOCKS[ticker]||{name:ticker,emoji:'📈'};
  document.getElementById('alTitle').textContent=`🔔 Alert for ${ticker}`;
  document.getElementById('alSub').textContent=`${s.name} · Current price: ${data?'$'+fmt(data.price):'unknown'}`;
  document.getElementById('alertPriceInp').value=data?data.price.toFixed(2):'';
  document.getElementById('alAboveBtn').classList.add('sel');
  document.getElementById('alBelowBtn').classList.remove('sel');
  openModal('alertModal');
}

function selectAlertType(type){
  state.alertType=type;
  document.getElementById('alAboveBtn').classList.toggle('sel',type==='above');
  document.getElementById('alBelowBtn').classList.toggle('sel',type==='below');
}

function saveAlert(){
  const price=parseFloat(document.getElementById('alertPriceInp').value);
  if(!price||isNaN(price)){toast('⚠️ Enter a valid price');return;}
  if(!state.profile.alerts) state.profile.alerts=[];
  state.profile.alerts.push({id:Date.now(),ticker:state.alertTicker,type:state.alertType,target:price,triggered:false,createdAt:new Date().toISOString()});
  save(); closeModal('alertModal');
  toast(`🔔 Alert set! Will notify when ${state.alertTicker} ${state.alertType==='above'?'rises above':'falls below'} $${fmt(price)}`);
}

function checkAlerts(ticker, currentPrice){
  if(!state.profile?.alerts) return;
  let triggered=false;
  state.profile.alerts.forEach(a=>{
    if(a.ticker!==ticker||a.triggered) return;
    if(a.type==='above'&&currentPrice>=a.target){a.triggered=true;triggered=true;toast(`🔔 ALERT! ${ticker} hit $${fmt(currentPrice)} — above your $${fmt(a.target)} target`,4000);}
    if(a.type==='below'&&currentPrice<=a.target){a.triggered=true;triggered=true;toast(`🔔 ALERT! ${ticker} hit $${fmt(currentPrice)} — below your $${fmt(a.target)} target`,4000);}
  });
  if(triggered) save();
}

// ─────────────────────────────────────────────────────────────────────────────
// SIGNAL ACCURACY LOG
// ─────────────────────────────────────────────────────────────────────────────
function logSignalView(ticker, signal, price){
  if(!state.profile.signalLog) state.profile.signalLog=[];
  // Only log once per ticker per day
  const today=new Date().toDateString();
  const existing=state.profile.signalLog.find(e=>e.ticker===ticker&&new Date(e.date).toDateString()===today);
  if(existing) return;
  state.profile.signalLog.unshift({id:Date.now(),date:new Date().toISOString(),ticker,signal,priceAtSignal:price,userAction:'viewed',outcome7d:null,outcome30d:null});
  if(state.profile.signalLog.length>200) state.profile.signalLog.pop();
  save();
}

function updateSignalOutcomes(){
  if(!state.profile?.signalLog) return;
  let changed=false;
  const now=Date.now();
  state.profile.signalLog.forEach(entry=>{
    if(!entry.priceAtSignal) return;
    const currentData=stockCache[entry.ticker];
    if(!currentData) return;
    const current=currentData.price;
    const diffMs=now-new Date(entry.date).getTime();
    const diffDays=diffMs/(1000*60*60*24);
    if(diffDays>=7&&entry.outcome7d===null){
      entry.outcome7d=((current-entry.priceAtSignal)/entry.priceAtSignal)*100;
      changed=true;
    }
    if(diffDays>=30&&entry.outcome30d===null){
      entry.outcome30d=((current-entry.priceAtSignal)/entry.priceAtSignal)*100;
      changed=true;
    }
  });
  if(changed) save();
}

// PORTFOLIO VIEW
// ─────────────────────────────────────────────────────────────────────────────
function renderPortfolio(){
  const c=document.getElementById('appContent');
  const p=state.profile;
  const pCfg=PROFILE_CFG.find(x=>x.id===state.profileId);
  let inv=0,lv=0;
  Object.entries(p.holdings).forEach(([t,h])=>{
    inv+=h.avgPrice*h.shares; lv+=(stockCache[t]?.price||h.avgPrice)*h.shares;
  });
  const total=p.cash+lv, diff=total-1000000, ret=(diff/1000000)*100;

  // Low balance warning
  let warnHtml='';
  if(total<10000){
    warnHtml=`<div class="bankrupt-card">
      <div class="bc-icon">💸</div>
      <div class="bc-title">Running low on cash!</div>
      <div class="bc-text">Your portfolio has dropped below $10,000. Paper trading is all about learning — want to reset and try again with $1,000,000?</div>
      <button class="bc-btn" onclick="confirmReset()">🔄 Reset Portfolio (Start Over)</button>
    </div>`;
  }

  // Holdings
  const holds=Object.entries(p.holdings);
  let holdsHtml=holds.length===0
    ?`<div class="empty"><div class="empty-icon">💼</div><div class="empty-title">No holdings yet</div><div class="empty-text">Go to Markets and make your first paper trade!</div></div>`
    :holds.map(([t,h])=>{
      const price=stockCache[t]?.price||h.avgPrice;
      const curV=price*h.shares, cost=h.avgPrice*h.shares, pnlA=curV-cost, pnlP=(pnlA/cost)*100;
      const s=STOCKS[t]||{emoji:'📈'};
      return `<div class="hold-card" onclick="showView('detail','${t}')">
        <div class="hold-top">
          <div><div class="hold-ticker">${s.emoji} ${t}</div><div class="hold-shares">${h.shares} shares · avg $${fmt(h.avgPrice)}</div></div>
          <div><div class="hold-val">$${fmtD(curV)}</div><div class="hold-pnl ${cc(pnlA)}">${pnlA>=0?'+':''}$${fmtD(Math.abs(pnlA))} (${pct(pnlP)})</div></div>
        </div>
      </div>`;
    }).join('');

  // Active alerts
  const allAlerts=(p.alerts||[]).filter(a=>!a.triggered);
  const alertsHtml=allAlerts.length
    ?allAlerts.map(a=>`<div class="alert-card">
        <div class="ac-left">
          <div class="ac-ticker">${a.ticker}</div>
          <div class="ac-cond">${a.type==='above'?'📈 Rises above':'📉 Falls below'} $${fmt(a.target)}</div>
          <span class="ac-status active">WATCHING</span>
        </div>
        <div class="ac-del" onclick="deleteAlert(${a.id})">🗑</div>
      </div>`).join('')
    :`<div class="empty" style="padding:14px;"><div class="empty-text">No active alerts. Open any stock and tap "Set a Price Alert".</div></div>`;

  // Recent trades
  const trades=p.tradeHistory.slice(0,20);
  const tradesHtml=trades.length
    ?trades.map(t=>`<div class="trade-row">
        <div><div class="tr-action ${t.action}">${t.action.toUpperCase()}</div><div class="tr-ticker">${t.ticker}</div><div class="tr-date">${new Date(t.date).toLocaleDateString()}</div></div>
        <div><div class="tr-amt">$${fmtD(t.total)}</div><div class="tr-shares">${t.shares>0?t.shares+' shares':''}</div></div>
      </div>`).join('')
    :`<div class="empty" style="padding:14px;"><div class="empty-text">No trades yet.</div></div>`;

  c.innerHTML=`
    ${warnHtml}
    <div class="port-hero">
      <div class="port-lbl">${pCfg?.name.toUpperCase()}'S PORTFOLIO</div>
      <div class="port-total">$${fmtD(total)}</div>
      <div class="port-pnl ${cc(diff)}">${diff>=0?'+':''}$${fmtD(Math.abs(diff))} (${pct(ret)}) overall</div>
    </div>
    <div class="port-rows">
      <div class="port-row"><span class="pr-lbl">Cash available</span><span class="pr-val">$${fmtD(p.cash)}</span></div>
      <div class="port-row"><span class="pr-lbl">Invested (live)</span><span class="pr-val">$${fmtD(lv)}</span></div>
      <div class="port-row"><span class="pr-lbl">Trade P&L</span><span class="pr-val ${cc(lv-inv)}">${lv-inv>=0?'+':''}$${fmtD(Math.abs(lv-inv))}</span></div>
    </div>
    <div class="sec-hdr">HOLDINGS (${holds.length})</div>
    ${holdsHtml}
    <div class="sec-hdr">PRICE ALERTS 🔔</div>
    ${alertsHtml}
    <div class="sec-hdr">TRADE HISTORY</div>
    ${tradesHtml}
    <div style="margin:16px;"><button style="width:100%;padding:12px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--dim);font-size:12px;cursor:pointer;" onclick="confirmReset()">🔄 Reset Portfolio</button></div>`;
}

function deleteAlert(id){
  state.profile.alerts=state.profile.alerts.filter(a=>a.id!==id);
  save(); renderPortfolio();
}

function confirmReset(){
  if(confirm(`Reset ${PROFILE_CFG.find(p=>p.id===state.profileId)?.name}'s portfolio back to $1,000,000? All trades and holdings will be cleared. (Signal history and learned terms are kept.)`)){
    const kept={learnedTerms:state.profile.learnedTerms||[], signalLog:state.profile.signalLog||[], mode:state.profile.mode};
    state.profile={...kept,cash:1000000,holdings:{},tradeHistory:[],alerts:[]};
    save(); toast('🔄 Portfolio reset to $1,000,000!'); renderPortfolio();
  }
}

// STATS VIEW
// ─────────────────────────────────────────────────────────────────────────────
function renderStats(){
  const c=document.getElementById('appContent');
  const p=state.profile;
  const pCfg=PROFILE_CFG.find(x=>x.id===state.profileId);
  const trades=p.tradeHistory;
  const sells=trades.filter(t=>t.action==='sell'&&t.pnl!=null);
  const wins=sells.filter(t=>t.pnl>=0);
  const winRate=sells.length?Math.round((wins.length/sells.length)*100):0;
  const best=sells.length?sells.reduce((a,b)=>(b.pnl||0)>(a.pnl||0)?b:a):null;
  const worst=sells.length?sells.reduce((a,b)=>(b.pnl||0)<(a.pnl||0)?b:a):null;
  const lv=Object.entries(p.holdings).reduce((s,[t,h])=>s+(stockCache[t]?.price||h.avgPrice)*h.shares,0);
  const total=p.cash+lv, diff=total-1000000, ret=(diff/1000000)*100;

  // Signal accuracy
  const log=p.signalLog||[];
  const scored=log.filter(e=>e.outcome7d!==null);
  const correct=scored.filter(e=>{
    if(e.signal==='BUY'&&e.outcome7d>0) return true;
    if(e.signal==='SELL'&&e.outcome7d<0) return true;
    return false;
  });
  const accRate=scored.length?Math.round((correct.length/scored.length)*100):null;

  // Family comparison
  const familyHtml=PROFILE_CFG.filter(x=>x.id!==state.profileId).map(x=>{
    const prof=loadProfile(x.id);
    const lv2=Object.entries(prof.holdings).reduce((s,[t,h])=>s+(stockCache[t]?.price||h.avgPrice)*h.shares,0);
    const tot2=prof.cash+lv2, diff2=tot2-1000000, ret2=(diff2/1000000)*100;
    const sells2=prof.tradeHistory.filter(t=>t.action==='sell'&&t.pnl!=null);
    const wins2=sells2.filter(t=>t.pnl>=0);
    const wr2=sells2.length?Math.round((wins2.length/sells2.length)*100):0;
    return `<div class="compare-box">
      <div class="cb-left"><div class="cb-name">${x.emoji} ${x.name}</div><div class="cb-role">${x.role}</div></div>
      <div class="cb-right">
        <div class="cb-val">$${fmtD(tot2)}</div>
        <div class="cb-ret ${cc(diff2)}">${diff2>=0?'+':''}$${fmtD(Math.abs(diff2))} (${pct(ret2)})</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px;">${prof.tradeHistory.length} trades · ${wr2}% wins</div>
      </div>
    </div>`;
  }).join('');

  // Accuracy log
  const accRows=log.slice(0,30).map(e=>{
    const outcome=e.outcome7d!=null?e.outcome7d:e.outcome30d;
    const pending=outcome==null;
    let outcomeHtml,outSub;
    if(pending){outcomeHtml='<span style="color:var(--dim);">Pending</span>';outSub='7-day result coming';}
    else{
      const isCorrect=(e.signal==='BUY'&&outcome>0)||(e.signal==='SELL'&&outcome<0);
      outcomeHtml=`<span class="${cc(outcome)}">${outcome>=0?'+':''}${outcome.toFixed(1)}%</span>`;
      outSub=isCorrect?'✅ Signal was right':'❌ Signal was wrong';
    }
    return `<div class="acc-row">
      <div class="ar-left">
        <div><span class="ar-sig ${e.signal}">${e.signal}</span></div>
        <div class="ar-ticker">${e.ticker}</div>
        <div class="ar-date">${new Date(e.date).toLocaleDateString()} · $${fmt(e.priceAtSignal||0)}</div>
      </div>
      <div class="ar-right"><div class="ar-outcome">${outcomeHtml}</div><div class="ar-sub">${outSub}</div></div>
    </div>`;
  }).join('');

  c.innerHTML=`
    <div class="stats-card" id="myStatsCard">
      <div class="sc-hdr">
        <div class="sc-emoji">${pCfg?.emoji}</div>
        <div><div class="sc-pname">${pCfg?.name}'s Portfolio</div><div class="sc-psub">Phillips Family Stack Tracker</div></div>
      </div>
      <div class="sc-total">$${fmtD(total)}</div>
      <div class="sc-ret ${cc(diff)}">${diff>=0?'+':''}$${fmtD(Math.abs(diff))} · ${pct(ret)} return</div>
      <div class="sc-grid">
        <div class="sc-item"><div class="sc-item-lbl">TRADES MADE</div><div class="sc-item-val">${trades.length}</div><div class="sc-item-sub">total trades</div></div>
        <div class="sc-item"><div class="sc-item-lbl">WIN RATE</div><div class="sc-item-val">${sells.length?winRate+'%':'—'}</div><div class="sc-item-sub">${wins.length}/${sells.length} closed</div></div>
        <div class="sc-item"><div class="sc-item-lbl">BEST CALL</div><div class="sc-item-val green">${best?best.ticker:'—'}</div><div class="sc-item-sub">${best?'+$'+fmtD(best.pnl):'make some trades!'}</div></div>
        <div class="sc-item"><div class="sc-item-lbl">SIGNAL ACC.</div><div class="sc-item-val">${accRate!=null?accRate+'%':'—'}</div><div class="sc-item-sub">${scored.length} signals scored</div></div>
      </div>
      <button class="share-card-btn" onclick="showShareCard()">📊 Show Leaderboard Card</button>
    </div>
    <div class="sec-hdr">FAMILY LEADERBOARD 🏆</div>
    ${familyHtml||'<div class="empty" style="padding:14px;"><div class="empty-text">Other family members haven\'t started yet!</div></div>'}
    <div style="margin:0 12px 8px;background:var(--surface);border-radius:12px;padding:13px 15px;border:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.6;">
      💡 <strong style="color:var(--bright);">Compare tip:</strong> Open Stats at the same time and show each other your phones. Highest % return wins! 📱
    </div>
    <div class="sec-hdr">SIGNAL ACCURACY LOG 📝</div>
    <div style="margin:0 12px 12px;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;">
      ${accRows||'<div class="empty" style="padding:14px;"><div class="empty-text">Signals get scored after 7 days. Start viewing stocks to build your accuracy history!</div></div>'}
    </div>`;
}

function renderLearn(){
  const c=document.getElementById('appContent');
  const learned=state.profile.learnedTerms||[];
  const pct2=Math.round((learned.length/GLOSSARY.length)*100);
  const terms=GLOSSARY.map(g=>`
    <div class="term-card" onclick="openLearnById('${g.id}')">
      <div class="term-check">${learned.includes(g.id)?'✅':'⬜'}</div>
      <div><div class="term-name">${g.name}</div><div class="term-preview">${g.short}</div></div>
    </div>`).join('');
  c.innerHTML=`
    <div class="view-header"><div class="view-title">Learn 🎓</div><div class="view-sub">Tap any term to learn what it means</div></div>
    <div class="learn-progress">
      <div class="lp-hdr"><div class="lp-title">Terms Learned</div><div class="lp-count">${learned.length} / ${GLOSSARY.length}</div></div>
      <div class="lp-bar"><div class="lp-fill" style="width:${pct2}%"></div></div>
    </div>${terms}`;
}

function openLearnById(id){
  const term=GLOSSARY.find(g=>g.id===id||id.startsWith(g.id)||g.id.startsWith(id.replace(/cross/,'').replace(/ma/,'ma')));
  if(!term) return;
  const learned=state.profile.learnedTerms||[];
  const isLearned=learned.includes(term.id);
  const cur=typeof term.current==='function'?term.current():'';
  document.getElementById('learnContent').innerHTML=`
    <div style="font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;color:var(--bright);margin-bottom:16px;">${term.name}</div>
    <div class="learn-sec"><div class="learn-lbl">WHAT IS IT?</div><div class="learn-txt">${term.what}</div></div>
    <div class="learn-sec"><div class="learn-lbl">WHY DOES IT MATTER?</div><div class="learn-txt">${term.why}</div></div>
    ${cur?`<div class="learn-sec"><div class="learn-lbl">GOOD TO KNOW</div><div class="learn-txt">${cur}</div></div>`:''}
    <div class="learn-sec"><div class="learn-lbl">REAL WORLD ANALOGY 💡</div><div class="learn-txt">${term.analogy}</div></div>
    <button class="learn-mark-btn ${isLearned?'done':''}" onclick="markLearned('${term.id}')" id="learnMarkBtn">
      ${isLearned?'✅ Already learned this one!':'✅ Mark as Learned'}</button>`;
  openModal('learnModal');
}

function markLearned(id){
  if(!state.profile.learnedTerms) state.profile.learnedTerms=[];
  if(!state.profile.learnedTerms.includes(id)){
    state.profile.learnedTerms.push(id); save();
    toast('🎓 Term learned! '+state.profile.learnedTerms.length+'/'+GLOSSARY.length+' total');
    document.getElementById('learnMarkBtn').textContent='✅ Already learned this one!';
    document.getElementById('learnMarkBtn').className='learn-mark-btn done';
  }
}

// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init(){
  let p=0; const iv=setInterval(()=>{p=Math.min(p+12,90);const f=document.getElementById('ldFill');if(f)f.style.width=p+'%';},150);
  setTimeout(()=>{
    clearInterval(iv);
    const f=document.getElementById('ldFill');if(f)f.style.width='100%';
    setTimeout(()=>{
      document.getElementById('loader').classList.add('fade');
      setTimeout(()=>document.getElementById('loader').classList.add('hidden'),500);
    },300);
  },1400);
  renderProfileScreen();
}

init();
